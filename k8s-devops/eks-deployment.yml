apiVersion: v1
kind: Namespace
metadata:
  name: bancolombia-cards

---
# --- Java Backend Deployment & Service ---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-backend-deployment
  namespace: bancolombia-cards
  labels:
    app: java-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-backend
  template:
    metadata:
      labels:
        app: java-backend
    spec:
      containers:
      - name: java-card-manager
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/bancolombia/java-card-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        # Resource constraints for performance and cost management in AWS EKS
        resources:
          requests:
            cpu: "250m"
            memory: "384Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        # Health probes for High Availability (HA) self-healing
        livenessProbe:
          httpGet:
            path: /api/clients
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/clients
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"

---
apiVersion: v1
kind: Service
metadata:
  name: java-backend-service
  namespace: bancolombia-cards
spec:
  selector:
    app: java-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# --- FastAPI BFF & Web Deployment & Service ---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-bff-deployment
  namespace: bancolombia-cards
  labels:
    app: fastapi-bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-bff
  template:
    metadata:
      labels:
        app: fastapi-bff
    spec:
      containers:
      - name: fastapi-bff
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/bancolombia/fastapi-bff:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: JAVA_BACKEND_URL
          value: "http://java-backend-service.bancolombia-cards.svc.cluster.local:8080"

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-bff-service
  namespace: bancolombia-cards
spec:
  selector:
    app: fastapi-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer

---
# --- Horizontal Pod Autoscaler (HPA) ---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: java-backend-hpa
  namespace: bancolombia-cards
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: java-backend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
